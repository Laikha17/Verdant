<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Verdant Glass</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand">🪴 Verdant</a>
        <div class="nav-links">
            <a href="login.html" class="nav-link">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2 class="text-center" style="margin-bottom: 2rem;">Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="reg-role" class="form-control" required>
                        <option value="buyer">Plant Buyer</option>
                        <option value="manager">Nursery Manager</option>
                    </select>
                </div>
                <button type="submit" id="reg-btn" class="btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-light);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight:600;">Log in</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/app.js" defer></script>
</body>
</html>
