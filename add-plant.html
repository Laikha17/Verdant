<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Plant - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-color);">
    <nav id="navbar" class="navbar"></nav>
    
    <div class="container" style="max-width: 600px; padding-top: 3rem;">
        <div style="background: var(--surface); padding: 3rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="color: var(--primary); font-size: 1.8rem;">Add New Plant</h1>
                <a href="admin.html" style="color: var(--text-light); font-weight: 500;">&larr; Back to Dashboard</a>
            </div>
            
            <form id="add-plant-form">
                <div class="form-group">
                    <label>Plant Name</label>
                    <input type="text" id="p-name" class="form-control" required placeholder="e.g. Monstera Deliciosa">
                </div>
                
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="p-price" class="form-control" step="0.01" min="1" required placeholder="e.g. 25.99">
                </div>
                
                <div class="form-group">
                    <label>Category (Hold Ctrl/Cmd to select multiple)</label>
                    <select id="p-category" class="form-control" multiple style="height: 100px;" required>
                        <option value="indoor">Indoor</option>
                        <option value="outdoor">Outdoor</option>
                        <option value="low-maintenance">Low Maintenance</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="p-image" class="form-control" required placeholder="https://images.unsplash.com/...">
                </div>
                
                <div class="form-group">
                    <label>Care Instructions</label>
                    <textarea id="p-care" class="form-control" rows="4" required placeholder="Enter care details..."></textarea>
                </div>
                
                <button type="submit" id="submit-btn" class="btn-primary" style="margin-top: 1rem; padding: 1rem;">Add Plant to Inventory</button>
                <div id="status-msg" style="text-align: center; margin-top: 1rem; font-weight: 500;"></div>
            </form>
        </div>
    </div>
    
    <script type="module" src="js/app.js" defer></script>
</body>
</html>
