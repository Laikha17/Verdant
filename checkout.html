<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Verdant Nursery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar"></nav>
    
    <div class="container" style="max-width: 900px;">
        <h1 class="section-title" style="text-align: left; margin-bottom: 2rem;">Your Cart</h1>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; align-items: start;">
            <!-- Cart Items -->
            <div id="cart-container">
                <p>Loading cart...</p>
            </div>
            
            <!-- Summary Sidebar -->
            <div class="cart-summary" style="margin-top: 0; position: sticky; top: 100px;">
                <h3 style="margin-bottom: 1.5rem; text-align: left; width: 100%;">Order Summary</h3>
                
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 1rem; color: var(--text-light);">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 1rem; color: var(--text-light); padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 2rem; font-size: 1.3rem; font-weight: 700; color: var(--text);">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>
                
                <div style="width: 100%; margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600;">Payment Method</label>
                    <select class="form-control">
                        <option>Credit Card (Simulated)</option>
                        <option>Cash on Delivery</option>
                    </select>
                </div>
                
                <button id="checkout-btn" class="btn-primary" style="width: 100%; padding: 1rem; border-radius: 50px;">
                    Pay Securely
                </button>
            </div>
        </div>
    </div>
    
    <!-- Success Modal -->
    <div id="success-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--surface); padding: 3rem; border-radius: 20px; text-align: center; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: zoomIn 0.3s forwards;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🌿</div>
            <h2 style="color: var(--primary); margin-bottom: 1rem; font-size: 2rem;">Order Successful!</h2>
            <p style="color: var(--text-light); margin-bottom: 2rem; line-height: 1.6;">Thank you for your purchase. Your payment was processed successfully, and we are preparing your plants for shipping.</p>
            <button id="continue-btn" class="btn-primary" style="border-radius: 50px; padding: 0.8rem 2rem;">Continue Shopping</button>
        </div>
    </div>

    <style>
        @keyframes zoomIn { to { transform: scale(1); } }
    </style>

    <script type="module" src="js/app.js" defer></script>
</body>
</html>
