<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Verdant Glass</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand">🪴 Verdant</a>
        <div class="nav-links">
            <a href="register.html" class="nav-link">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2 class="text-center" style="margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-light);">
                Don't have an account? <a href="register.html" style="color: var(--primary); font-weight:600;">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Ensure logic matches the single source of truth app.js -->
    <script type="module" src="js/app.js" defer></script>
</body>
</html>
