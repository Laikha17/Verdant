<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Verdant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar"></nav>
    
    <div class="container">
        <div class="auth-container">
            <h2 id="auth-title" class="text-center" style="margin-bottom: 2rem; color: var(--primary);">Login to Verdant</h2>
            
            <form id="auth-form">
                <div class="form-group" id="name-group" style="display: none;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <div id="auth-error" class="error-msg"></div>
                
                <button type="submit" id="auth-btn" class="btn-primary" style="margin-top: 1rem;">Login</button>
                
                <div class="form-toggle">
                    <p id="toggle-text">Don't have an account? <a id="toggle-link" style="color:var(--primary);cursor:pointer;font-weight:600;">Register here</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
