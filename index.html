<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Verdant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar"></nav>
    
    <div class="container">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 1rem;">Welcome to Verdant</h1>
            <p style="color: var(--text-light); font-size: 1.1rem;">Discover premium plants for your space.</p>
        </div>
        
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="low-light">Low Light</button>
            <button class="filter-btn" data-filter="pet-friendly">Pet Friendly</button>
            <button class="filter-btn" data-filter="air-purifying">Air Purifying</button>
        </div>
        
        <div id="plants-grid" class="grid">
            <p style="text-align: center; grid-column: 1 / -1; color: var(--text-light);">Loading plants...</p>
        </div>
    </div>
    <script type="module" src="js/seed.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
