<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Verdant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar"></nav>
    <div class="container">
        <h2 style="color: var(--primary); margin-bottom: 2rem;">Your Cart</h2>
        
        <div id="cart-container">
            <p style="color: var(--text-light);">Loading cart...</p>
        </div>
        
        <div id="cart-summary-section" class="cart-summary" style="display: none;">
            <h3>Total: $<span id="cart-total">0.00</span></h3>
            <div style="margin-top: 1.5rem;">
                <label style="font-weight:500; margin-right: 1rem;">Payment Method:</label>
                <select id="payment-method" style="padding: 0.8rem; border-radius: 6px; border: 1px solid var(--border); font-family: inherit;">
                    <option value="card">Credit Card (Simulation)</option>
                    <option value="upi">UPI (Simulation)</option>
                    <option value="cod">Cash on Delivery</option>
                </select>
            </div>
            <button id="checkout-btn" class="btn-primary" style="margin-top: 1.5rem; width: auto; font-size: 1.1rem; padding: 1rem 2rem;">Pay Now</button>
        </div>
    </div>
    
    <div id="spinner" class="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
